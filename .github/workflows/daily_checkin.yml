name: 每日签到

on:
  schedule:
    - cron: '30 1 * * *' # 北京时间 9:30
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Checkin
        env:
          ANYROUTER_ACCOUNT: ${{ secrets.ANYROUTER_ACCOUNT }}
          ANYROUTER_COOKIE: ${{ secrets.ANYROUTER_COOKIE }}
          FACAI_ACCOUNT: ${{ secrets.FACAI_ACCOUNT }}
          FACAI_COOKIE: ${{ secrets.FACAI_COOKIE }}
          FACAI_USERID: ${{ secrets.FACAI_USERID }}
        run: python main.py
